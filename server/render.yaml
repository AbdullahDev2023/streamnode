services:
  - type: web
    name: auracast-server
    env: node
    region: singapore  # closest free region for India
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000         # Render assigns this automatically
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: RATE_LIMIT_ENABLED
        value: true
      - key: FIREBASE_DB_URL
        value: https://auracast-df815-default-rtdb.asia-southeast1.firebasedatabase.app
      - key: FIREBASE_DB_SECRET
        sync: false          # Set this secret in Render dashboard manually
      - key: WS_PING_INTERVAL_MS
        value: 30000
      - key: STALE_THRESHOLD_MS
        value: 90000
      - key: STALE_CHECK_MS
        value: 15000
      - key: STATS_INTERVAL_MS
        value: 2000
      - key: CHANNEL_GRACE_MS
        value: 300000
      - key: SERVER_VOLUME_GAIN
        value: "3.0"
